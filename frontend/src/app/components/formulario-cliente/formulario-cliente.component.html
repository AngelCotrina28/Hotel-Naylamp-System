<div class="form-container">
  <h3>Registrar Nuevo Cliente</h3>
  
  <form [formGroup]="clienteForm" (ngSubmit)="guardarCliente()" class="form-compacto">
  
  <div class="form-row">
    <div class="campo" style="flex: 0.5;"> <label>DNI / Documento</label>
      <input type="text" formControlName="documento" placeholder="Ingrese DNI">
    </div>
  </div>

  <div class="form-row">
    <div class="campo col-50">
      <label>Nombres</label>
      <input type="text" formControlName="nombre">
    </div>
    <div class="campo col-50">
      <label>Apellidos</label>
      <input type="text" formControlName="apellido">
    </div>
  </div>

  <div class="form-row">
    <div class="campo col-50">
      <label>Correo</label>
      <input type="email" formControlName="correo">
    </div>
    <div class="campo col-50">
      <label>Teléfono</label>
      <input type="text" formControlName="telefono">
    </div>
  </div>

  <div class="form-row">
    <div class="campo ancho-completo">
      <label>Dirección</label>
      <input type="text" formControlName="direccion">
    </div>
  </div>

  <div class="form-row">
    <div class="campo col-33">
      <label>Departamento</label>
      <input type="text" formControlName="departamento">
    </div>
    <div class="campo col-33">
      <label>Provincia</label>
      <input type="text" formControlName="provincia">
    </div>
    <div class="campo col-33">
      <label>Distrito</label>
      <input type="text" formControlName="distrito">
    </div>
  </div>

  <button type="submit" class="btn-guardar" [disabled]="clienteForm.invalid">
    Guardar Cliente
  </button>

</form>
</div>
